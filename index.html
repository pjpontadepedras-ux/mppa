<script>
/* =========================================================
   MPPA — Triagem de Processos · Front-end corrigido
   Corrige:
   - login travado
   - exibição do campo de senha
   - habilitação do botão Entrar
   - integração básica com Apps Script
   - configuração local/remota
   - stubs para não quebrar botões ainda não implementados
   ========================================================= */

const STORAGE_KEYS = {
  appUrl: 'mppa_triagem_app_url',
  accessCode: 'mppa_triagem_access_code',
  assessorPwdHash: 'mppa_triagem_pwd_hash_local',
  currentUser: 'mppa_triagem_current_user',
  currentRole: 'mppa_triagem_current_role',
  userName: 'mppa_triagem_user_name',
  estag1: 'mppa_triagem_estag1',
  estag2: 'mppa_triagem_estag2',
  apiKey: 'mppa_triagem_api_key'
};

let RAW = [];
let CURRENT_ROLE = '';
let CURRENT_USER = '';
let APP_URL = '';
let REMOTE_PWD_HASH = null;
let SELECTED_FILTER = 'inbox';
let CURRENT_TAB = 'tri';

function $(id){ return document.getElementById(id); }
function show(el){ if (el) el.style.display = ''; }
function hide(el){ if (el) el.style.display = 'none'; }

function toast(msg){
  const t = $('toast');
  if (!t) return;
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function safeJsonParse(str, fallback = null) {
  try { return JSON.parse(str); } catch { return fallback; }
}

function esc(str){
  return String(str ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#039;');
}

function HOJE(){ return new Date(); }

function pBR(s){
  if (!s) return null;
  if (s instanceof Date) return s;
  if (typeof s !== 'string') return null;
  const [datePart, timePart = '00:00:00'] = s.trim().split(' ');
  if (!datePart) return null;

  if (datePart.includes('/')) {
    const [d, m, y] = datePart.split('/');
    return new Date(`${y}-${m}-${d}T${timePart}`);
  }
  return new Date(s);
}

function dias(dt){
  if (!dt) return 0;
  const d = (dt instanceof Date) ? dt : pBR(dt);
  if (!d || isNaN(d)) return 0;
  return Math.floor((HOJE() - d) / 86400000);
}

function fdt(dt){
  const d = (dt instanceof Date) ? dt : pBR(dt);
  if (!d || isNaN(d)) return '';
  return String(d.getDate()).padStart(2,'0') + '/' +
         String(d.getMonth() + 1).padStart(2,'0') + '/' +
         d.getFullYear();
}

function fdth(dt){
  const d = (dt instanceof Date) ? dt : pBR(dt);
  if (!d || isNaN(d)) return '';
  return fdt(d) + ' ' +
         String(d.getHours()).padStart(2,'0') + ':' +
         String(d.getMinutes()).padStart(2,'0');
}

async function sha256(text){
  const enc = new TextEncoder().encode(text);
  const hashBuffer = await crypto.subtle.digest('SHA-256', enc);
  const bytes = Array.from(new Uint8Array(hashBuffer));
  return bytes.map(b => b.toString(16).padStart(2, '0')).join('');
}

function getLocal(key, fallback = ''){
  const v = localStorage.getItem(key);
  return v == null ? fallback : v;
}

function setLocal(key, value){
  localStorage.setItem(key, value ?? '');
}

function removeLocal(key){
  localStorage.removeItem(key);
}

function normalizeCode(v){
  return String(v || '').toLowerCase().replace(/[^a-z0-9]/g, '');
}

function setSyncStatus(text, cls = ''){
  const el = $('sync-st');
  if (!el) return;
  el.textContent = text;
  el.className = 'ss' + (cls ? ' ' + cls : '');
}

function setSyncUrl(url){
  APP_URL = url || '';
  const disp = $('sync-disp');
  if (disp) disp.textContent = APP_URL || 'não configurado';
}

async function apiGet(action, params = {}) {
  if (!APP_URL) throw new Error('URL do Apps Script não configurada.');
  const url = new URL(APP_URL);
  url.searchParams.set('action', action);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== undefined && v !== null) url.searchParams.set(k, v);
  });
  const res = await fetch(url.toString(), { method: 'GET' });
  if (!res.ok) throw new Error('Falha HTTP ' + res.status);
  return await res.json();
}

async function apiPost(body) {
  if (!APP_URL) throw new Error('URL do Apps Script não configurada.');
  const res = await fetch(APP_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) throw new Error('Falha HTTP ' + res.status);
  return await res.json();
}

/* =========================
   LOGIN
   ========================= */

function onRoleChange() {
  const role = $('lsel')?.value || '';
  const pwdWrap = $('pwd-wrap');
  const pwdErr = $('pwd-err');
  const pwdInput = $('lpwd');

  if (pwdErr) pwdErr.style.display = 'none';

  if (role === 'assessor') {
    if (pwdWrap) pwdWrap.style.display = 'block';
  } else {
    if (pwdWrap) pwdWrap.style.display = 'none';
    if (pwdInput) pwdInput.value = '';
  }
  checkLoginBtn();
}

function checkLoginBtn() {
  const role = $('lsel')?.value || '';
  const pwd = $('lpwd')?.value || '';
  const btn = $('lbtn');

  if (!btn) return;

  if (!role) {
    btn.disabled = true;
    return;
  }

  if (role === 'assessor') {
    // Se já houver hash configurado, pede senha.
    // Se não houver hash remoto/local, permite entrar para configurar.
    const hasHash = !!(REMOTE_PWD_HASH || getLocal(STORAGE_KEYS.assessorPwdHash, ''));
    btn.disabled = hasHash ? pwd.trim().length === 0 : false;
    return;
  }

  btn.disabled = false;
}

async function doLogin() {
  const role = $('lsel')?.value || '';
  const pwd = $('lpwd')?.value || '';
  const pwdErr = $('pwd-err');

  if (pwdErr) pwdErr.style.display = 'none';

  if (!role) {
    toast('Selecione quem está acessando.');
    return;
  }

  if (role === 'assessor') {
    const savedHash = REMOTE_PWD_HASH || getLocal(STORAGE_KEYS.assessorPwdHash, '');
    if (savedHash) {
      const typedHash = await sha256(pwd);
      if (typedHash !== savedHash) {
        if (pwdErr) pwdErr.style.display = 'block';
        toast('Senha incorreta.');
        return;
      }
    }
    CURRENT_ROLE = 'assessor';
    CURRENT_USER = getLocal(STORAGE_KEYS.userName, 'Assessor');
  } else {
    CURRENT_ROLE = role;
    CURRENT_USER = role;
  }

  setLocal(STORAGE_KEYS.currentRole, CURRENT_ROLE);
  setLocal(STORAGE_KEYS.currentUser, CURRENT_USER);

  enterApp();
  toast('Entrada realizada.');
}

function doLogout() {
  CURRENT_ROLE = '';
  CURRENT_USER = '';
  removeLocal(STORAGE_KEYS.currentRole);
  removeLocal(STORAGE_KEYS.currentUser);

  if ($('ls')) $('ls').style.display = 'flex';
  if ($('sdb')) $('sdb').style.display = 'none';
  if ($('mc')) $('mc').style.display = 'none';

  if ($('lsel')) $('lsel').value = '';
  if ($('lpwd')) $('lpwd').value = '';
  onRoleChange();
}

function enterApp() {
  if ($('ls')) $('ls').style.display = 'none';
  if ($('sdb')) $('sdb').style.display = 'flex';
  if ($('mc')) $('mc').style.display = 'flex';

  if ($('ubadge')) {
    $('ubadge').textContent = CURRENT_ROLE === 'assessor'
      ? `Assessor · ${CURRENT_USER || 'Assessor'}`
      : `Estagiário · ${CURRENT_USER || CURRENT_ROLE}`;
  }

  if ($('cfg-pwd-section')) {
    $('cfg-pwd-section').style.display = CURRENT_ROLE === 'assessor' ? 'block' : 'none';
  }

  if ($('tbb-est')) $('tbb-est').style.display = CURRENT_ROLE === 'assessor' ? '' : 'none';
  if ($('tbb-rev')) $('tbb-rev').style.display = CURRENT_ROLE === 'assessor' ? '' : 'none';
  if ($('aact')) $('aact').style.display = CURRENT_ROLE === 'assessor' ? 'flex' : 'none';

  populateAssigneeSelect();
  renderAll();
  syncLoad(true);
}

/* =========================
   CONFIGURAÇÃO
   ========================= */

function openCfg() {
  if ($('cfg-modal')) $('cfg-modal').classList.add('open');

  const isAssessor = CURRENT_ROLE === 'assessor' || ($('lsel')?.value === 'assessor');
  if ($('cfg-assessor-section')) $('cfg-assessor-section').style.display = isAssessor ? '' : 'none';
  if ($('cfg-estag-section')) $('cfg-estag-section').style.display = isAssessor ? 'none' : '';

  if ($('cfg-url')) $('cfg-url').value = getLocal(STORAGE_KEYS.appUrl, '');
  if ($('cfg-code')) $('cfg-code').value = getLocal(STORAGE_KEYS.accessCode, '');
  if ($('cfg-estag-code')) $('cfg-estag-code').value = getLocal(STORAGE_KEYS.accessCode, '');
  if ($('cfg-estag1')) $('cfg-estag1').value = getLocal(STORAGE_KEYS.estag1, 'Amanda');
  if ($('cfg-estag2')) $('cfg-estag2').value = getLocal(STORAGE_KEYS.estag2, '');
  if ($('cfg-api')) $('cfg-api').value = getLocal(STORAGE_KEYS.apiKey, '');
  if ($('cfg-nome')) $('cfg-nome').value = getLocal(STORAGE_KEYS.userName, CURRENT_USER || '');
  if ($('cfg-pwd-new')) $('cfg-pwd-new').value = '';
  if ($('cfg-pwd-confirm')) $('cfg-pwd-confirm').value = '';
  if ($('cfg-pwd-err')) $('cfg-pwd-err').style.display = 'none';
}

function closeCfg() {
  if ($('cfg-modal')) $('cfg-modal').classList.remove('open');
}

async function saveCfg() {
  const isAssessor = CURRENT_ROLE === 'assessor' || ($('lsel')?.value === 'assessor');

  const nome = $('cfg-nome')?.value?.trim() || '';
  if (nome) setLocal(STORAGE_KEYS.userName, nome);

  if (isAssessor) {
    const url = $('cfg-url')?.value?.trim() || '';
    const code = normalizeCode($('cfg-code')?.value || '');
    const estag1 = $('cfg-estag1')?.value?.trim() || '';
    const estag2 = $('cfg-estag2')?.value?.trim() || '';
    const apiKey = $('cfg-api')?.value?.trim() || '';

    setLocal(STORAGE_KEYS.appUrl, url);
    setLocal(STORAGE_KEYS.accessCode, code);
    setLocal(STORAGE_KEYS.estag1, estag1);
    setLocal(STORAGE_KEYS.estag2, estag2);
    setLocal(STORAGE_KEYS.apiKey, apiKey);
    setSyncUrl(url);

    const newPwd = $('cfg-pwd-new')?.value || '';
    const confirmPwd = $('cfg-pwd-confirm')?.value || '';
    if (newPwd || confirmPwd) {
      if (newPwd !== confirmPwd) {
        if ($('cfg-pwd-err')) $('cfg-pwd-err').style.display = 'block';
        return;
      }
      const hash = await sha256(newPwd);
      setLocal(STORAGE_KEYS.assessorPwdHash, hash);
      REMOTE_PWD_HASH = hash;
      if (APP_URL) {
        try {
          await apiPost({ action: 'saveConfig', pwdHash: hash });
        } catch (err) {
          console.error(err);
          toast('Senha salva localmente, mas falhou no servidor.');
        }
      }
    }

    if (APP_URL && code) {
      try {
        await apiPost({ action: 'saveCode', code, url: APP_URL });
      } catch (err) {
        console.error(err);
        toast('Código não foi salvo no servidor.');
      }
    }

    populateAssigneeSelect();
    toast('Configurações salvas.');
    closeCfg();
    return;
  }

  const estagCode = normalizeCode($('cfg-estag-code')?.value || '');
  if (!estagCode) {
    toast('Digite o código de acesso.');
    return;
  }

  try {
    const localUrl = getLocal(STORAGE_KEYS.appUrl, '');
    if (localUrl) setSyncUrl(localUrl);

    if (!APP_URL && localUrl) {
      // tenta usar a URL local primeiro
      try {
        const cfg = await apiGet('getCode', { code: estagCode });
        if (cfg.ok && cfg.url) {
          setLocal(STORAGE_KEYS.accessCode, estagCode);
          setLocal(STORAGE_KEYS.appUrl, cfg.url);
          setSyncUrl(cfg.url);
        }
      } catch {}
    }

    if (!APP_URL) {
      toast('Peça ao assessor para informar a URL do Apps Script neste navegador ao menos uma vez.');
      return;
    }

    const res = await apiGet('getCode', { code: estagCode });
    if (!res.ok || !res.url) throw new Error(res.error || 'Código inválido');

    setLocal(STORAGE_KEYS.accessCode, estagCode);
    setLocal(STORAGE_KEYS.appUrl, res.url);
    setSyncUrl(res.url);

    if ($('cfg-estag-status')) {
      $('cfg-estag-status').textContent = 'Conectado com sucesso.';
      $('cfg-estag-status').style.color = '#16a34a';
    }

    toast('Conexão realizada.');
    closeCfg();
  } catch (err) {
    console.error(err);
    if ($('cfg-estag-status')) {
      $('cfg-estag-status').textContent = err.message || 'Falha ao validar código.';
      $('cfg-estag-status').style.color = '#dc2626';
    }
    toast('Falha ao conectar.');
  }
}

async function loadRemoteConfig() {
  if (!APP_URL) return;
  try {
    const res = await apiGet('getConfig');
    if (res.ok) {
      REMOTE_PWD_HASH = res.pwdHash || null;
      checkLoginBtn();
    }
  } catch (err) {
    console.error('Falha ao carregar config remota:', err);
  }
}

/* =========================
   DADOS / SYNC
   ========================= */

async function syncLoad(showToast = false) {
  if (!APP_URL) {
    setSyncStatus('não configurado', 'err');
    renderAll();
    return;
  }

  try {
    setSyncStatus('carregando...', 'loading');
    const res = await apiGet('load');
    if (!res.ok) throw new Error(res.error || 'Falha no carregamento');

    const data = res.data;
    if (Array.isArray(data)) {
      RAW = data;
    } else if (data && Array.isArray(data.processos)) {
      RAW = data.processos;
    } else if (data && Array.isArray(data.items)) {
      RAW = data.items;
    } else {
      RAW = [];
    }

    renderAll();
    setSyncStatus('sincronizado', 'ok');
    if (showToast) toast('Dados carregados.');
  } catch (err) {
    console.error(err);
    setSyncStatus('erro ao sincronizar', 'err');
    if (showToast) toast('Erro ao carregar dados.');
  }
}

async function syncSave(showToast = false) {
  if (!APP_URL) {
    toast('Configure a URL do Apps Script.');
    return;
  }

  try {
    setSyncStatus('salvando...', 'loading');
    const res = await apiPost({ action: 'save', data: RAW });
    if (!res.ok) throw new Error(res.error || 'Erro ao salvar');
    setSyncStatus('sincronizado', 'ok');
    if (showToast) toast('Dados salvos.');
  } catch (err) {
    console.error(err);
    setSyncStatus('erro ao salvar', 'err');
    if (showToast) toast('Erro ao salvar dados.');
  }
}

/* =========================
   RENDER
   ========================= */

function getProcessList() {
  return Array.isArray(RAW) ? RAW : [];
}

function getAssigneeNames() {
  const names = [];
  const e1 = getLocal(STORAGE_KEYS.estag1, 'Amanda').trim();
  const e2 = getLocal(STORAGE_KEYS.estag2, '').trim();
  if (e1) names.push(e1);
  if (e2) names.push(e2);
  return names;
}

function populateAssigneeSelect() {
  const sel = $('sel-atrib');
  if (!sel) return;
  sel.innerHTML = '<option value="">— Estagiário —</option>';
  getAssigneeNames().forEach(name => {
    const op = document.createElement('option');
    op.value = name;
    op.textContent = name;
    sel.appendChild(op);
  });
}

function isUrg(p) {
  return !!(p.urgente || p.urg || p.prioridade === 'urgente');
}
function isDone(p) {
  return !!(p.concluido || p.done || p.status === 'concluido');
}
function isRev(p) {
  return !!(p.revisao || p.aguardandoRevisao || p.status === 'revisao');
}
function isBx(p) {
  return !!(p.baixa || p.aguardandoBaixa || p.status === 'baixa');
}
function isPendente(p) {
  return !isDone(p);
}
function isInbox(p) {
  return !p.atribuidoPara && !p.responsavel && !isDone(p);
}
function getCat(p) {
  return String(p.categoria || p.tipo || '').toLowerCase();
}
function getEntrada(p) {
  return p.dataEntrada || p.entrada || p.criadoEm || p.data || null;
}
function getNumero(p) {
  return p.numero || p.processo || p.num || '—';
}
function getResumo(p) {
  return p.resumo || p.comando || p.objeto || '';
}
function getResp(p) {
  return p.atribuidoPara || p.responsavel || '';
}

function filterProcesses(list) {
  const term = ($('srch')?.value || '').trim().toLowerCase();

  let out = list.filter(p => {
    if (SELECTED_FILTER === 'inbox' && !isInbox(p)) return false;
    if (SELECTED_FILTER === 'all') return true;
    if (SELECTED_FILTER === 'urg' && !isUrg(p)) return false;
    if (SELECTED_FILTER === 'rev' && !isRev(p)) return false;
    if (SELECTED_FILTER === 'bx' && !isBx(p)) return false;
    if (SELECTED_FILTER === 'cri' && getCat(p) !== 'criminal') return false;
    if (SELECTED_FILTER === 'civ' && getCat(p) !== 'cível' && getCat(p) !== 'civel') return false;
    if (SELECTED_FILTER === 'cie' && getCat(p) !== 'mera ciência' && getCat(p) !== 'mera ciencia') return false;
    if (SELECTED_FILTER === 'ant' && dias(getEntrada(p)) <= 7) return false;
    if (SELECTED_FILTER === 'pnd' && !isPendente(p)) return false;
    if (SELECTED_FILTER === 'ok' && !isDone(p)) return false;
    return true;
  });

  if (term) {
    out = out.filter(p => {
      const hay = [
        getNumero(p),
        getResumo(p),
        getCat(p),
        getResp(p)
      ].join(' ').toLowerCase();
      return hay.includes(term);
    });
  }

  const srt = $('srt')?.value || 'ent_asc';
  out.sort((a, b) => {
    const da = pBR(getEntrada(a)) || new Date(0);
    const db = pBR(getEntrada(b)) || new Date(0);

    if (srt === 'ent_desc') return db - da;
    if (srt === 'urg') return Number(isUrg(b)) - Number(isUrg(a)) || da - db;
    if (srt === 'dias') return dias(getEntrada(b)) - dias(getEntrada(a));
    if (srt === 'pnd') return Number(isPendente(b)) - Number(isPendente(a)) || da - db;
    if (srt === 'inbox') return Number(isInbox(b)) - Number(isInbox(a)) || da - db;
    return da - db;
  });

  return out;
}

function renderTri() {
  const host = $('plist');
  if (!host) return;

  const filtered = filterProcesses(getProcessList());
  $('tb-tri') && ($('tb-tri').textContent = String(filtered.length));

  if (!filtered.length) {
    host.innerHTML = `<div class="empty">Nenhum processo encontrado.</div>`;
    renderStats();
    return;
  }

  host.innerHTML = filtered.map((p, idx) => {
    const numero = esc(getNumero(p));
    const resumo = esc(getResumo(p));
    const cat = esc(p.categoria || p.tipo || '—');
    const entrada = esc(fdth(getEntrada(p)));
    const resp = esc(getResp(p));
    const classes = [
      'pc',
      isUrg(p) ? 'urg' : '',
      isDone(p) ? 'done' : '',
      isBx(p) ? 'bx' : ''
    ].join(' ').trim();

    return `
      <div class="${classes}">
        <div class="ch" onclick="toggleProc(${idx})">
          <button class="pnb" type="button">${numero}</button>
          <div class="cmeta">
            <span class="mt t-${getCat(p).startsWith('cri') ? 'cri' : getCat(p).startsWith('cív') || getCat(p).startsWith('civ') ? 'civ' : 'cie'}">${cat}</span>
            ${isUrg(p) ? '<span class="mt t-urg">Urgente</span>' : ''}
            ${isDone(p) ? '<span class="mt t-ok">Concluído</span>' : ''}
            ${isRev(p) ? '<span class="mt t-bx">Revisão</span>' : ''}
            ${isBx(p) ? '<span class="mt t-cpl">Baixa</span>' : ''}
          </div>
          <div class="csum"><strong>${resumo || 'Sem resumo'}</strong></div>
          <div class="cent">${entrada || 'Sem data'}</div>
          <div class="cchv">⌄</div>
        </div>
        <div class="cb-body">
          <div class="fr">
            <div>
              <label class="fl">Número</label>
              <input class="fc" value="${numero}" oninput="updateProcField(${idx}, 'numero', this.value)">
            </div>
            <div>
              <label class="fl">Categoria</label>
              <select class="fc" onchange="updateProcField(${idx}, 'categoria', this.value)">
                <option value="Criminal" ${cat.toLowerCase()==='criminal'?'selected':''}>Criminal</option>
                <option value="Cível" ${cat.toLowerCase()==='cível'||cat.toLowerCase()==='civel'?'selected':''}>Cível</option>
                <option value="Mera ciência" ${cat.toLowerCase()==='mera ciência'||cat.toLowerCase()==='mera ciencia'?'selected':''}>Mera ciência</option>
              </select>
            </div>
            <div>
              <label class="fl">Entrada</label>
              <input class="fc" value="${entrada}" oninput="updateProcField(${idx}, 'dataEntrada', this.value)">
            </div>
            <div>
              <label class="fl">Responsável</label>
              <input class="fc" value="${resp}" oninput="updateProcField(${idx}, 'atribuidoPara', this.value)">
            </div>
          </div>
          <div class="fr1">
            <label class="fl">Resumo / comando</label>
            <textarea class="fc" oninput="updateProcField(${idx}, 'resumo', this.value)">${resumo}</textarea>
          </div>
          <div class="flags" style="margin-top:12px">
            <label class="fi"><input type="checkbox" ${isUrg(p)?'checked':''} onchange="toggleFlag(${idx}, 'urgente', this.checked)"> Urgente</label>
            <label class="fi"><input type="checkbox" ${isRev(p)?'checked':''} onchange="toggleFlag(${idx}, 'revisao', this.checked)"> Aguardando revisão</label>
            <label class="fi"><input type="checkbox" ${isBx(p)?'checked':''} onchange="toggleFlag(${idx}, 'baixa', this.checked)"> Aguardando baixa</label>
            <label class="fi"><input type="checkbox" ${isDone(p)?'checked':''} onchange="toggleFlag(${idx}, 'concluido', this.checked)"> Concluído</label>
          </div>
          <div class="fa">
            <button class="btn btn-b btn-sm" onclick="syncSave(true)">Salvar</button>
          </div>
        </div>
      </div>
    `;
  }).join('');

  renderStats();
}

function toggleProc(idx) {
  const cards = Array.from(document.querySelectorAll('#plist .pc'));
  const card = cards[idx];
  if (card) card.classList.toggle('open');
}

function updateProcField(filteredIndex, field, value) {
  const filtered = filterProcesses(getProcessList());
  const proc = filtered[filteredIndex];
  if (!proc) return;
  proc[field] = value;
}

function toggleFlag(filteredIndex, field, checked) {
  const filtered = filterProcesses(getProcessList());
  const proc = filtered[filteredIndex];
  if (!proc) return;
  proc[field] = checked;
}

function renderStats() {
  const list = getProcessList();
  const inbox = list.filter(isInbox).length;
  const urg = list.filter(isUrg).length;
  const ok = list.filter(isDone).length;
  const atr = list.filter(p => !!getResp(p)).length;
  const rev = list.filter(isRev).length;
  const bx = list.filter(isBx).length;
  const cri = list.filter(p => getCat(p) === 'criminal').length;
  const civ = list.filter(p => getCat(p) === 'cível' || getCat(p) === 'civel').length;
  const cie = list.filter(p => getCat(p) === 'mera ciência' || getCat(p) === 'mera ciencia').length;
  const ant = list.filter(p => dias(getEntrada(p)) > 7).length;
  const pnd = list.filter(isPendente).length;

  $('st-inbox') && ($('st-inbox').textContent = inbox);
  $('st') && ($('st').textContent = list.length);
  $('su') && ($('su').textContent = urg);
  $('sc2') && ($('sc2').textContent = ok);
  $('sa') && ($('sa').textContent = atr);
  $('srev') && ($('srev').textContent = rev);
  $('sb2') && ($('sb2').textContent = bx);

  $('n-inbox') && ($('n-inbox').textContent = inbox);
  $('n-all') && ($('n-all').textContent = list.length);
  $('n-urg') && ($('n-urg').textContent = urg);
  $('n-rev') && ($('n-rev').textContent = rev);
  $('n-bx') && ($('n-bx').textContent = bx);
  $('n-cri') && ($('n-cri').textContent = cri);
  $('n-civ') && ($('n-civ').textContent = civ);
  $('n-cie') && ($('n-cie').textContent = cie);
  $('n-ant') && ($('n-ant').textContent = ant);
  $('n-pnd') && ($('n-pnd').textContent = pnd);
  $('n-ok') && ($('n-ok').textContent = ok);
  $('tb-bx') && ($('tb-bx').textContent = bx);
  $('tb-rev') && ($('tb-rev').textContent = rev);
  $('tb-est') && ($('tb-est').textContent = getAssigneeNames().length);

  const total = list.length || 1;
  const pct = Math.round((ok / total) * 100);
  $('pf') && ($('pf').style.width = pct + '%');
  $('ptxt') && ($('ptxt').textContent = `${ok} / ${list.length} concluídos`);
}

function renderRev() {
  const host = $('revlist');
  if (!host) return;
  const items = getProcessList().filter(isRev);
  host.innerHTML = items.length
    ? items.map(p => `
        <div class="bcard">
          <div style="font-family:var(--fm);font-size:12px;font-weight:600">${esc(getNumero(p))}</div>
          <div style="font-size:12px;color:var(--tx2);margin-top:4px">${esc(getResumo(p) || 'Sem resumo')}</div>
        </div>
      `).join('')
    : `<div class="empty">Nenhuma minuta aguardando revisão.</div>`;
}

function renderBx() {
  const host = $('bxlist');
  if (!host) return;
  const items = getProcessList().filter(isBx);
  host.innerHTML = items.length
    ? items.map(p => `
        <div class="bcard">
          <div style="font-family:var(--fm);font-size:12px;font-weight:600">${esc(getNumero(p))}</div>
          <div style="font-size:12px;color:var(--tx2);margin-top:4px">${esc(getResumo(p) || 'Sem resumo')}</div>
        </div>
      `).join('')
    : `<div class="empty">Nenhum processo aguardando baixa.</div>`;
}

function renderEst() {
  const host = $('estlists');
  if (!host) return;
  const names = getAssigneeNames();
  if (!names.length) {
    host.innerHTML = `<div class="empty">Nenhum estagiário configurado.</div>`;
    return;
  }
  host.innerHTML = names.map(name => {
    const itens = getProcessList().filter(p => getResp(p) === name);
    return `
      <div class="el-block">
        <div class="el-head">
          <div class="el-av">${esc(name[0] || '?')}</div>
          <div>
            <div class="en">${esc(name)}</div>
            <div class="esub">${itens.length} processos atribuídos</div>
          </div>
        </div>
        ${itens.length ? itens.map(p => `
          <div class="bcard">
            <div style="font-family:var(--fm);font-size:12px;font-weight:600">${esc(getNumero(p))}</div>
            <div style="font-size:12px;color:var(--tx2);margin-top:4px">${esc(getResumo(p) || 'Sem resumo')}</div>
          </div>
        `).join('') : `<div class="empty" style="padding:1rem">Sem processos atribuídos.</div>`}
      </div>
    `;
  }).join('');
}

function renderAll() {
  renderTri();
  renderRev();
  renderBx();
  renderEst();
}

function sf(filter, el) {
  SELECTED_FILTER = filter;
  document.querySelectorAll('.sb-nav .ni').forEach(n => n.classList.remove('active'));
  if (el) el.classList.add('active');

function swTab(tab, btn) {
  CURRENT_TAB = tab;
  document.querySelectorAll('.tc').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tbb').forEach(b => b.classList.remove('active'));

   ========================= */

function openAddModal() {
  if ($('add-modal')) $('add-modal').classList.add('open');
  if ($('add-num')) $('add-num').value = '';
  if ($('add-dt')) $('add-dt').value = new Date().toISOString().slice(0,16);
  if ($('add-err')) $('add-err').style.display = 'none';
  checkAddForm();
}

function checkAddForm() {
  const num = $('add-num')?.value?.trim() || '';
  const exists = getProcessList().some(p => getNumero(p) === num);
  if ($('add-err')) $('add-err').style.display = exists ? 'block' : 'none';
  if ($('add-save')) $('add-save').disabled = !num || exists;
}

function doAddProc() {
  const num = $('add-num')?.value?.trim() || '';
  const dt = $('add-dt')?.value || '';
  if (!num) return;
  RAW.push({
    numero: num,
    dataEntrada: dt ? dt.replace('T', ' ') : '',
    categoria: 'Criminal',
    resumo: '',
    urgente: false,
    revisao: false,
    baixa: false,
    concluido: false,
    atribuidoPara: ''
  });
  $('add-modal')?.classList.remove('open');
  renderAll();
  syncSave(true);
}

function parseBulk() {
  const txt = $('bulk-text')?.value || '';
  const lines = txt.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  let ok = 0;
  for (const line of lines) {
    const parts = line.split('\t');
    if (parts.length >= 2) ok++;
  }
  if ($('bulk-preview')) $('bulk-preview').textContent = `${ok} linha(s) válida(s) para importação.`;
  if ($('bulk-save')) $('bulk-save').disabled = ok === 0;
}

function doBulkImport() {
  const txt = $('bulk-text')?.value || '';
  const lines = txt.split(/\r?\n/).map(s => s.trim()).filter(Boolean);
  let imported = 0;
  for (const line of lines) {
    const [dataHora, numero] = line.split('\t');
    if (!dataHora || !numero) continue;
    if (getProcessList().some(p => getNumero(p) === numero.trim())) continue;
    RAW.push({
      numero: numero.trim(),
      dataEntrada: dataHora.trim(),
      categoria: 'Criminal',
      resumo: '',
      urgente: false,
      revisao: false,
      baixa: false,
      concluido: false,
      atribuidoPara: ''
    });
    imported++;
  }
  $('bulk-modal')?.classList.remove('open');
  renderAll();
  syncSave(true);
  toast(`${imported} processo(s) importado(s).`);
}

function exportCSV() {
  const rows = [
    ['numero','dataEntrada','categoria','resumo','urgente','revisao','baixa','concluido','atribuidoPara'],
    ...getProcessList().map(p => [
      getNumero(p),
      getEntrada(p) || '',
      p.categoria || '',
      (getResumo(p) || '').replace(/\r?\n/g, ' '),
      isUrg(p),
      isRev(p),
      isBx(p),
      isDone(p),
      getResp(p)
    ])
  ];

  const csv = rows.map(r => r.map(v => {
    const s = String(v ?? '');
    return /[",;\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }).join(';')).join('\n');

  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'triagem_mppa.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

async function boot() {
  setSyncUrl(getLocal(STORAGE_KEYS.appUrl, ''));
  CURRENT_ROLE = getLocal(STORAGE_KEYS.currentRole, '');
  CURRENT_USER = getLocal(STORAGE_KEYS.currentUser, '');

  if ($('cfg-modal')) {
    $('cfg-modal').addEventListener('click', e => {
      if (e.target === $('cfg-modal')) closeCfg();
    });
  }
  if ($('bulk-modal')) {
    $('bulk-modal').addEventListener('click', e => {
      if (e.target === $('bulk-modal')) $('bulk-modal').classList.remove('open');
    });
  }
  if ($('add-modal')) {
    $('add-modal').addEventListener('click', e => {
      if (e.target === $('add-modal')) $('add-modal').classList.remove('open');
    });
  }

  await loadRemoteConfig();
  onRoleChange();

  if (CURRENT_ROLE) {
    enterApp();
  } else {
    if ($('ls')) $('ls').style.display = 'flex';
    if ($('sdb')) $('sdb').style.display = 'none';
    if ($('mc')) $('mc').style.display = 'none';
  }
}

document.addEventListener('DOMContentLoaded', boot);
