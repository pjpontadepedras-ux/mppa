<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Gemini API — MPPA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:12px;padding:32px 36px;max-width:520px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h2{font-size:17px;color:#1a2744;margin-bottom:4px}
.sub{font-size:12px;color:#8892aa;margin-bottom:24px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#5a6272;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1.5px solid #d0d4dc;border-radius:6px;font-size:13px;margin-bottom:14px;font-family:inherit;color:#1c2333}
input:focus{outline:none;border-color:#4f78d4}
button{width:100%;padding:11px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:8px}
button:hover{background:#253561}
button:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:16px;background:#f8f9fb;border:1px solid #e2e5ea;border-radius:8px;padding:14px;font-size:12px;font-family:monospace;line-height:1.8;max-height:380px;overflow-y:auto;white-space:pre-wrap;display:none}
.ok{color:#166534;font-weight:600}
.err{color:#991b1b;font-weight:600}
.warn{color:#92400e}
.info{color:#1e40af}
.countdown{text-align:center;font-size:13px;color:#5a6272;padding:10px;display:none}
</style>
</head>
<body>
<div class="box">
  <h2>Teste da API Gemini</h2>
  <p class="sub">MPPA · Polo Marajó I · gemini-2.0-flash</p>

  <label>Chave API Gemini</label>
  <input type="text" id="key" placeholder="AIzaSy...">

  <button id="btn" onclick="testar()">▶ Testar agora</button>
  <div class="countdown" id="countdown"></div>
  <div class="log" id="log"></div>
</div>

<script>
var logEl = document.getElementById('log');
var btn = document.getElementById('btn');
var countdownEl = document.getElementById('countdown');
var MODEL = 'gemini-2.0-flash';

function log(msg, cls) {
  logEl.style.display = 'block';
  var line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

window.onload = function() {
  var saved = localStorage.getItem('mppa_gemini');
  if (saved && saved.length > 10) {
    document.getElementById('key').value = saved;
  }
};

async function testar() {
  logEl.innerHTML = '';
  logEl.style.display = 'block';
  countdownEl.style.display = 'none';

  var key = document.getElementById('key').value.trim();
  if (!key) { log('Cole a chave no campo.', 'err'); return; }

  btn.disabled = true;
  btn.textContent = 'Testando...';
  log('Modelo: ' + MODEL, 'info');
  log('Chave: ' + key.substring(0,12) + '... (' + key.length + ' chars)');
  log('Enviando requisição...');

  var t0 = Date.now();
  try {
    var resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/' + MODEL + ':generateContent?key=' + key,
      {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          contents: [{parts: [{text: 'Responda somente: MPPA OK.'}]}],
          generationConfig: {temperature: 0, maxOutputTokens: 10}
        })
      }
    );

    var ms = Date.now() - t0;
    log('HTTP ' + resp.status + ' · ' + ms + 'ms', resp.ok ? 'ok' : 'warn');

    var data = await resp.json();

    if (resp.status === 429) {
      log('');
      log('⚠ Rate limit (429) — chave válida, modelo disponível.', 'warn');
      log('Limite: 15 requisições/minuto no plano gratuito.', 'warn');
      log('');
      log('Aguardando 62 segundos para tentar novamente...', 'info');
      localStorage.setItem('mppa_gemini', key);
      iniciarContagem(62, key);
      return;
    }

    if (data.candidates && data.candidates[0]) {
      var texto = data.candidates[0].content.parts[0].text.trim();
      log('');
      log('✓ API FUNCIONANDO!', 'ok');
      log('Resposta: ' + texto, 'ok');
      log('Latência: ' + ms + 'ms', 'ok');
      log('');
      log('Chave salva no sistema. Pode fechar esta página.', 'ok');
      localStorage.setItem('mppa_gemini', key);
    } else if (data.error) {
      log('');
      log('✗ Erro ' + data.error.code + ': ' + data.error.message, 'err');
      if (data.error.code === 400) log('Chave inválida — verifique se copiou corretamente.', 'warn');
      if (data.error.code === 403) log('Sem permissão — verifique o projeto no AI Studio.', 'warn');
      if (data.error.code === 404) log('Modelo não disponível nesta chave.', 'warn');
    }

  } catch(e) {
    log('');
    log('✗ Erro de rede: ' + e.message, 'err');
    log('Possível bloqueio de firewall. Teste com hotspot do celular.', 'warn');
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Testar novamente';
  }
}

function iniciarContagem(segundos, key) {
  btn.disabled = true;
  btn.textContent = 'Aguardando...';
  countdownEl.style.display = 'block';

  var restante = segundos;
  var interval = setInterval(function() {
    restante--;
    countdownEl.textContent = 'Próxima tentativa em ' + restante + 's...';
    if (restante <= 0) {
      clearInterval(interval);
      countdownEl.style.display = 'none';
      log('');
      log('Tentando novamente...', 'info');
      btn.disabled = false;
      btn.textContent = '▶ Testar novamente';
      document.getElementById('key').value = key;
      testar();
    }
  }, 1000);
}
</script>
</body>
</html>
