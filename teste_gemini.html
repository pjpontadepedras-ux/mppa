<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Gemini API — MPPA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:12px;padding:32px 36px;max-width:520px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h2{font-size:17px;color:#1a2744;margin-bottom:4px}
.sub{font-size:12px;color:#8892aa;margin-bottom:24px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#5a6272;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1.5px solid #d0d4dc;border-radius:6px;font-size:13px;margin-bottom:14px;font-family:inherit;color:#1c2333}
input:focus{outline:none;border-color:#4f78d4}
button{width:100%;padding:11px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
button:hover{background:#253561}
button:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:16px;background:#f8f9fb;border:1px solid #e2e5ea;border-radius:8px;padding:14px;font-size:12px;font-family:'SF Mono','Fira Code',monospace;line-height:1.8;max-height:360px;overflow-y:auto;white-space:pre-wrap;color:#1c2333;display:none}
.ok{color:#166534;font-weight:600}
.err{color:#991b1b;font-weight:600}
.warn{color:#92400e}
.info{color:#1e40af}
</style>
</head>
<body>
<div class="box">
  <h2>Teste da API Gemini</h2>
  <p class="sub">MPPA · Polo Marajó I — detecta automaticamente o modelo disponível</p>
  <label>Chave API Gemini</label>
  <input type="text" id="key" placeholder="Cole aqui: AIzaSy...">
  <button id="btn" onclick="testar()">▶ Testar e detectar modelo</button>
  <div class="log" id="log"></div>
</div>
<script>
var logEl = document.getElementById('log');
var btn = document.getElementById('btn');

// Modelos para testar em ordem de preferência
var MODELS = [
  'gemini-2.0-flash',
  'gemini-2.0-flash-lite',
  'gemini-1.5-flash',
  'gemini-1.5-flash-8b',
  'gemini-1.5-pro',
  'gemini-pro'
];

function log(msg, cls) {
  logEl.style.display = 'block';
  var d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}

window.onload = function() {
  var saved = localStorage.getItem('mppa_gemini');
  if (saved && saved.length > 10) {
    document.getElementById('key').value = saved;
    log('Chave carregada do localStorage.', 'info');
  }
};

async function tentarModelo(key, model) {
  var url = 'https://generativelanguage.googleapis.com/v1beta/models/' + model + ':generateContent?key=' + key;
  var t0 = Date.now();
  var resp = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      contents: [{parts: [{text: 'Responda apenas: OK'}]}],
      generationConfig: {temperature: 0, maxOutputTokens: 10}
    })
  });
  var ms = Date.now() - t0;
  var data = await resp.json();
  return {status: resp.status, ms: ms, data: data, model: model};
}

async function testar() {
  logEl.innerHTML = '';
  logEl.style.display = 'block';
  var key = document.getElementById('key').value.trim();
  if (!key) { log('Cole a chave antes de testar.', 'err'); return; }

  log('Chave: ' + key.substring(0,12) + '... (' + key.length + ' chars)');
  log('');
  log('Testando modelos disponíveis...', 'info');

  btn.disabled = true; btn.textContent = 'Testando...';

  var modelOk = null;
  try {
    for (var i = 0; i < MODELS.length; i++) {
      var m = MODELS[i];
      log('  → ' + m + ' ...');
      try {
        var r = await tentarModelo(key, m);
        if (r.status === 200 && r.data.candidates) {
          log('  ✓ ' + m + ' — FUNCIONANDO (' + r.ms + 'ms)', 'ok');
          modelOk = m;
          break;
        } else if (r.status === 404) {
          log('  ✗ ' + m + ' — não disponível nesta chave');
        } else if (r.status === 400 || r.status === 403) {
          log('  ✗ ' + m + ' — erro ' + r.status + ': ' + (r.data.error && r.data.error.message || ''), 'err');
          break; // problema na chave, não adianta tentar outros
        } else if (r.status === 429) {
          log('  ⚠ ' + m + ' — rate limit (429)', 'warn');
        } else {
          log('  ? ' + m + ' — status ' + r.status);
        }
      } catch(e) {
        log('  ✗ ' + m + ' — ' + e.message, 'err');
        if (e.message.includes('fetch') || e.message.includes('network') || e.message.includes('CORS')) break;
      }
    }

    log('');
    if (modelOk) {
      log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'ok');
      log('✓ CHAVE VÁLIDA E FUNCIONAL', 'ok');
      log('  Modelo disponível: ' + modelOk, 'ok');
      localStorage.setItem('mppa_gemini', key);
      localStorage.setItem('mppa_gemini_model', modelOk);
      log('✓ Chave e modelo salvos no sistema.', 'ok');
      log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'ok');
      log('');
      log('Próximo passo: abra o módulo extrajudicial,', 'info');
      log('importe o inventário e use o botão Despacho.', 'info');
    } else {
      log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━', 'err');
      log('✗ Nenhum modelo funcionou com esta chave.', 'err');
      log('');
      log('Causas possíveis:', 'warn');
      log('1. Chave inválida — gere outra em aistudio.google.com', 'warn');
      log('2. Firewall da rede bloqueando googleapis.com', 'warn');
      log('   → Teste com o celular no 4G (hotspot)', 'warn');
    }
  } catch(e) {
    log('');
    log('✗ Erro de rede: ' + e.message, 'err');
    log('Possível bloqueio de firewall. Teste no celular.', 'warn');
  } finally {
    btn.disabled = false; btn.textContent = '▶ Testar novamente';
  }
}
</script>
</body>
</html>
