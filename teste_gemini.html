<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Gemini API — MPPA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:12px;padding:32px 36px;max-width:520px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h2{font-size:17px;color:#1a2744;margin-bottom:4px}
.sub{font-size:12px;color:#8892aa;margin-bottom:24px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#5a6272;display:block;margin-bottom:5px}
input{width:100%;padding:10px 12px;border:1.5px solid #d0d4dc;border-radius:6px;font-size:13px;margin-bottom:14px;font-family:inherit;color:#1c2333}
input:focus{outline:none;border-color:#4f78d4}
button{width:100%;padding:11px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
button:hover{background:#253561}
button:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:16px;background:#f8f9fb;border:1px solid #e2e5ea;border-radius:8px;padding:14px;font-size:12px;font-family:'SF Mono','Fira Code',monospace;line-height:1.7;max-height:320px;overflow-y:auto;white-space:pre-wrap;color:#1c2333;display:none}
.ok{color:#166534;font-weight:600}
.err{color:#991b1b;font-weight:600}
.warn{color:#92400e}
.info{color:#1e40af}
</style>
</head>
<body>
<div class="box">
  <h2>Teste da API Gemini</h2>
  <p class="sub">MPPA · Polo Marajó I — diagnóstico completo da chave</p>

  <label>Chave API Gemini</label>
  <input type="text" id="key" placeholder="Cole aqui: AIzaSy...">

  <button id="btn" onclick="testar()">▶ Testar agora</button>

  <div class="log" id="log"></div>
</div>

<script>
var logEl = document.getElementById('log');
var btn   = document.getElementById('btn');

function log(msg, cls) {
  logEl.style.display = 'block';
  var line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function logLine(label, val, cls) {
  log(label + ': ' + val, cls);
}

// Tenta carregar a chave do localStorage
window.onload = function() {
  var saved = localStorage.getItem('mppa_gemini');
  if (saved && saved.length > 10) {
    document.getElementById('key').value = saved;
    log('Chave carregada do localStorage do sistema.', 'info');
  } else {
    log('Nenhuma chave salva encontrada. Cole a chave no campo acima.', 'warn');
  }
};

async function testar() {
  logEl.innerHTML = '';
  logEl.style.display = 'block';

  var key = document.getElementById('key').value.trim();

  log('=== DIAGNÓSTICO DA API GEMINI ===');
  log('');

  // 1. Valida a chave
  logLine('Chave informada', key ? key.substring(0,12)+'...' : '(vazia)', key ? 'info' : 'err');
  if (!key) {
    log('ERRO: Cole a chave no campo antes de testar.', 'err');
    return;
  }
  if (!key.startsWith('AIzaSy')) {
    log('AVISO: A chave não começa com "AIzaSy". Verifique se copiou corretamente.', 'warn');
  }
  logLine('Comprimento', key.length + ' caracteres', key.length > 30 ? 'ok' : 'warn');

  btn.disabled = true;
  btn.textContent = 'Testando...';

  // 2. Testa conectividade básica
  log('');
  log('[1/3] Testando conectividade com Google APIs...', 'info');
  var t0 = Date.now();

  try {
    var url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + key;
    log('URL: ' + url.substring(0, 70) + '...');

    var resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: 'Responda exatamente: MPPA OK.' }] }],
        generationConfig: { temperature: 0, maxOutputTokens: 15 }
      })
    });

    var ms = Date.now() - t0;
    logLine('HTTP Status', resp.status + ' ' + resp.statusText, resp.ok ? 'ok' : 'err');
    logLine('Latência', ms + 'ms', ms < 3000 ? 'ok' : 'warn');

    // 3. Parse da resposta
    log('');
    log('[2/3] Analisando resposta...', 'info');

    var text = await resp.text();
    log('Resposta bruta (' + text.length + ' chars): ' + text.substring(0, 200));

    var data;
    try { data = JSON.parse(text); }
    catch(e) { log('ERRO: Resposta não é JSON válido: ' + e.message, 'err'); return; }

    // 4. Resultado
    log('');
    log('[3/3] Resultado final', 'info');

    if (data.candidates && data.candidates[0] && data.candidates[0].content) {
      var resposta = data.candidates[0].content.parts[0].text.trim();
      log('');
      log('✓ API FUNCIONANDO CORRETAMENTE!', 'ok');
      logLine('Resposta do modelo', resposta, 'ok');
      // Salva no localStorage
      localStorage.setItem('mppa_gemini', key);
      log('✓ Chave salva no localStorage do sistema.', 'ok');
      log('');
      log('Pode fechar esta página e usar os botões Despacho no módulo extrajudicial.', 'info');

    } else if (data.error) {
      log('✗ ERRO NA API', 'err');
      logLine('Código', data.error.code, 'err');
      logLine('Mensagem', data.error.message, 'err');
      log('');
      var c = data.error.code;
      var m = data.error.message || '';
      if (c === 400 || m.includes('API_KEY')) {
        log('CAUSA: Chave API inválida ou mal formatada.', 'warn');
        log('SOLUÇÃO: Gere uma nova chave em aistudio.google.com', 'warn');
      } else if (c === 403) {
        log('CAUSA: Chave sem permissão para o Gemini 1.5 Flash.', 'warn');
        log('SOLUÇÃO: Acesse aistudio.google.com e ative o modelo.', 'warn');
      } else if (c === 429) {
        log('CAUSA: Limite de requisições atingido.', 'warn');
        log('SOLUÇÃO: Aguarde 1 minuto e tente novamente.', 'warn');
      } else if (c === 404) {
        log('CAUSA: Modelo não encontrado ou não disponível na região.', 'warn');
      } else {
        log('CAUSA DESCONHECIDA. Verifique o Google AI Studio.', 'warn');
      }
    } else {
      log('Resposta inesperada — estrutura desconhecida.', 'warn');
      log(JSON.stringify(data, null, 2).substring(0, 400));
    }

  } catch(e) {
    var ms2 = Date.now() - t0;
    log('');
    log('✗ ERRO DE REDE OU CORS', 'err');
    logLine('Erro', e.message, 'err');
    logLine('Tempo até falha', ms2 + 'ms');
    log('');
    if (e.message.includes('Failed to fetch') || e.message.includes('NetworkError') || e.message.includes('CORS')) {
      log('CAUSA PROVÁVEL: Firewall corporativo ou bloqueio de rede.', 'warn');
      log('SOLUÇÃO: Teste usando a internet do celular (hotspot) e verifique se o resultado muda.', 'warn');
      log('');
      log('Se funcionar no celular mas não na rede do MPPA: a API do Google está bloqueada na rede interna.', 'warn');
      log('Nesse caso a solução é um proxy ou acesso via VPN.', 'warn');
    }
  } finally {
    btn.disabled = false;
    btn.textContent = '▶ Testar novamente';
  }
}
</script>
</body>
</html>
