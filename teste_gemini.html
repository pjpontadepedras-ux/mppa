<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Gemini API — MPPA</title>
<style>
body{font-family:-apple-system,sans-serif;max-width:560px;margin:60px auto;padding:0 20px;color:#1c2333}
h2{font-size:18px;margin-bottom:6px}
.sub{font-size:13px;color:#8892aa;margin-bottom:24px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#5a6272;display:block;margin-bottom:5px}
input{width:100%;padding:9px 12px;border:1.5px solid #d0d4dc;border-radius:6px;font-size:13px;box-sizing:border-box;margin-bottom:14px;font-family:inherit}
input:focus{outline:none;border-color:#4f78d4}
button{width:100%;padding:11px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
button:hover{background:#253561}
button:disabled{opacity:.5;cursor:not-allowed}
.result{margin-top:18px;padding:14px 16px;border-radius:8px;font-size:13px;line-height:1.6;display:none}
.ok{background:#f0fdf4;border:1px solid #86efac;color:#166534}
.err{background:#fef2f2;border:1px solid #fca5a5;color:#991b1b}
.loading{background:#fef9c3;border:1px solid #fde047;color:#854d0e}
.tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
</style>
</head>
<body>
<h2>Teste da API Gemini</h2>
<p class="sub">MPPA · Polo Marajó I — verifica se a chave está ativa e o modelo responde</p>

<label>Chave API Gemini</label>
<input type="text" id="key" placeholder="AIzaSy..." value="">

<button id="btn" onclick="testar()">Testar agora</button>

<div class="result" id="result">
  <div class="tag" id="res-tag"></div>
  <div id="res-msg"></div>
</div>

<script>
// Pré-carrega chave salva no localStorage (do módulo judicial/extrajudicial)
document.getElementById('key').value =
  localStorage.getItem('mppa_gemini') || '';

async function testar() {
  const key = document.getElementById('key').value.trim();
  const btn = document.getElementById('btn');
  const res = document.getElementById('result');
  const tag = document.getElementById('res-tag');
  const msg = document.getElementById('res-msg');

  if (!key) { alert('Cole a chave API antes de testar.'); return; }

  btn.disabled = true; btn.textContent = 'Testando...';
  res.className = 'result loading'; res.style.display = 'block';
  tag.textContent = 'Aguarde'; msg.textContent = 'Enviando requisição para o Gemini...';

  const t0 = Date.now();
  try {
    const resp = await fetch(
      'https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=' + key,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: 'Responda apenas com: API MPPA OK.' }] }],
          generationConfig: { temperature: 0, maxOutputTokens: 20 }
        })
      }
    );

    const data = await resp.json();
    const ms = Date.now() - t0;

    if (data.candidates && data.candidates[0]) {
      const texto = data.candidates[0].content.parts[0].text.trim();
      res.className = 'result ok';
      tag.textContent = 'API funcionando';
      msg.innerHTML =
        '<strong>Resposta do Gemini:</strong> ' + texto +
        '<br><br>Latência: ' + ms + 'ms<br>Modelo: gemini-1.5-flash<br><br>' +
        '<strong>Próximo passo:</strong> a chave já está salva no sistema. Pode fechar esta aba e usar os botões Despacho no módulo extrajudicial.';
      // Salva a chave no localStorage para os módulos usarem
      localStorage.setItem('mppa_gemini', key);
    } else if (data.error) {
      res.className = 'result err';
      tag.textContent = 'Erro na API';
      const code = data.error.code || '';
      const erMsg = data.error.message || '';
      let dica = '';
      if (code === 400) dica = 'Chave inválida ou mal formatada.';
      else if (code === 403) dica = 'Chave sem permissão para este modelo. Verifique no Google AI Studio.';
      else if (code === 429) dica = 'Limite de requisições atingido. Aguarde alguns minutos.';
      else if (erMsg.includes('API_KEY')) dica = 'Chave API inválida.';
      msg.innerHTML = '<strong>Código ' + code + ':</strong> ' + erMsg + (dica ? '<br><br>' + dica : '');
    } else {
      res.className = 'result err';
      tag.textContent = 'Resposta inesperada';
      msg.textContent = JSON.stringify(data, null, 2).substring(0, 300);
    }
  } catch(e) {
    const ms = Date.now() - t0;
    res.className = 'result err';
    tag.textContent = 'Erro de rede';
    msg.innerHTML = e.message + '<br><br>Possíveis causas: sem internet, domínio bloqueado por firewall corporativo, ou CORS.';
  } finally {
    btn.disabled = false; btn.textContent = 'Testar novamente';
  }
}
</script>
</body>
</html>
