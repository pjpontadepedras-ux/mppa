<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Claude API — MPPA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:12px;padding:32px 36px;max-width:520px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h2{font-size:17px;color:#1a2744;margin-bottom:4px}
.sub{font-size:12px;color:#8892aa;margin-bottom:24px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#5a6272;display:block;margin-bottom:5px}
input,textarea{width:100%;padding:10px 12px;border:1.5px solid #d0d4dc;border-radius:6px;font-size:12px;margin-bottom:12px;font-family:inherit;color:#1c2333}
input:focus,textarea:focus{outline:none;border-color:#4f78d4}
textarea{resize:vertical;min-height:60px;font-size:11px}
button{width:100%;padding:11px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:6px}
button:hover{background:#253561}
button:disabled{opacity:.5;cursor:not-allowed}
.log{margin-top:14px;background:#f8f9fb;border:1px solid #e2e5ea;border-radius:8px;padding:14px;font-size:12px;font-family:monospace;line-height:1.9;max-height:360px;overflow-y:auto;white-space:pre-wrap;display:none}
.ok{color:#166534;font-weight:600}
.err{color:#991b1b;font-weight:600}
.warn{color:#92400e}
.info{color:#1e40af}
</style>
</head>
<body>
<div class="box">
  <h2>Teste Claude API — via Proxy</h2>
  <p class="sub">MPPA · Polo Marajó I · usa o Apps Script como intermediário</p>

  <label>URL do Apps Script (Google Sheets)</label>
  <textarea id="gs" rows="2" placeholder="https://script.google.com/macros/s/...exec"></textarea>

  <label>Chave Claude (sk-ant-...)</label>
  <input type="text" id="key" placeholder="sk-ant-api03-...">

  <button id="btn" onclick="testar()">▶ Testar via proxy</button>
  <div class="log" id="log"></div>
</div>

<script>
var logEl = document.getElementById('log');
var btn   = document.getElementById('btn');

function log(msg, cls) {
  logEl.style.display = 'block';
  var line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

window.onload = function() {
  var gs  = localStorage.getItem('mppa_gs')  || '';
  var key = localStorage.getItem('mppa_ak')  || '';
  if (gs)  document.getElementById('gs').value  = gs;
  if (key) document.getElementById('key').value = key;
  if (gs && key) log('Credenciais carregadas do sistema.', 'info');
  else log('Preencha a URL do Apps Script e a chave Claude.', 'warn');
};

async function testar() {
  logEl.innerHTML = '';
  logEl.style.display = 'block';

  var gs  = document.getElementById('gs').value.trim();
  var key = document.getElementById('key').value.trim();

  if (!gs)  { log('Cole a URL do Apps Script.', 'err'); return; }
  if (!key) { log('Cole a chave Claude.', 'err'); return; }

  btn.disabled = true; btn.textContent = 'Testando...';

  log('Rota: Browser → Apps Script → Claude API', 'info');
  log('GS URL: ' + gs.substring(0, 60) + '...');
  log('Chave: ' + key.substring(0, 16) + '...');
  log('');
  log('[1/2] Chamando Apps Script proxy...', 'info');

  var t0 = Date.now();
  try {
    var resp = await fetch(gs, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        action:   'claude',
        apiKey:   key,
        messages: [{role: 'user', content: 'Responda apenas: Proxy MPPA OK.'}],
        max_tokens: 20
      })
    });

    var ms = Date.now() - t0;
    log('Apps Script HTTP ' + resp.status + ' · ' + ms + 'ms', resp.ok ? 'ok' : 'warn');

    var data = await resp.json();
    log('');
    log('[2/2] Resposta do Claude via proxy:', 'info');

    if (data.ok && data.text) {
      log('');
      log('✓ PROXY + CLAUDE FUNCIONANDO!', 'ok');
      log('Resposta: ' + data.text.trim(), 'ok');
      log('Modelo: ' + (data.model || 'claude'), 'ok');
      log('Latência total: ' + ms + 'ms', 'ok');
      if (data.usage) log('Tokens: ' + data.usage.input_tokens + ' in / ' + data.usage.output_tokens + ' out');
      log('');
      log('Chaves salvas. Botões Despacho prontos para uso.', 'ok');
      localStorage.setItem('mppa_ak', key);
      localStorage.setItem('mppa_gs', gs);

    } else if (data.error) {
      log('✗ Erro do proxy: ' + data.error, 'err');
      if (data.detail) log('Detalhe: ' + data.detail, 'warn');
      log('');
      if (data.error.includes('não configurada') || data.error.includes('Chave')) {
        log('CAUSA: Apps Script não recebeu ou não tem a chave Claude.', 'warn');
        log('SOLUÇÃO: Verifique se o Apps Script foi atualizado com o código do proxy.', 'warn');
      } else if (data.error.includes('401') || data.error.includes('authentication')) {
        log('CAUSA: Chave Claude inválida ou revogada.', 'warn');
        log('SOLUÇÃO: Gere nova chave em console.anthropic.com', 'warn');
      } else if (data.error.includes('claude')) {
        log('CAUSA: Apps Script antigo sem suporte ao proxy Claude.', 'warn');
        log('SOLUÇÃO: Adicione o código apps_script_claude_proxy.gs ao seu Apps Script.', 'warn');
      }

    } else {
      log('Resposta inesperada: ' + JSON.stringify(data).substring(0, 300), 'warn');
      log('');
      log('Possível causa: Apps Script ainda não tem o código do proxy.', 'warn');
      log('Adicione o código apps_script_claude_proxy.gs e republique.', 'warn');
    }

  } catch(e) {
    log('✗ Erro: ' + e.message, 'err');
    if (e.message.includes('fetch') || e.message.includes('CORS')) {
      log('Erro de rede ao chamar o Apps Script.', 'warn');
      log('Verifique se a URL do Apps Script está correta e publicada.', 'warn');
    }
  } finally {
    btn.disabled = false; btn.textContent = '▶ Testar novamente';
  }
}
</script>
</body>
</html>
