<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Teste Claude API — MPPA</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#f4f5f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:#fff;border-radius:12px;padding:32px 36px;max-width:540px;width:100%;box-shadow:0 2px 12px rgba(0,0,0,.08)}
h2{font-size:17px;color:#1a2744;margin-bottom:4px}
.sub{font-size:12px;color:#8892aa;margin-bottom:20px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:#5a6272;display:block;margin-bottom:4px;margin-top:12px}
input,textarea{width:100%;padding:9px 12px;border:1.5px solid #d0d4dc;border-radius:6px;font-size:12px;font-family:inherit;color:#1c2333}
input:focus,textarea:focus{outline:none;border-color:#4f78d4}
textarea{resize:vertical;min-height:56px;font-size:11px}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:16px}
button{padding:10px;background:#1a2744;color:#fff;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
button.sec{background:#fff;color:#1a2744;border:1.5px solid #d0d4dc}
button:hover{opacity:.85}
button:disabled{opacity:.4;cursor:not-allowed}
.log{margin-top:14px;background:#f8f9fb;border:1px solid #e2e5ea;border-radius:8px;padding:12px 14px;font-size:11.5px;font-family:monospace;line-height:1.9;max-height:340px;overflow-y:auto;white-space:pre-wrap;display:none}
.ok{color:#166534;font-weight:600}
.err{color:#991b1b;font-weight:600}
.warn{color:#92400e}
.info{color:#1e40af}
</style>
</head>
<body>
<div class="box">
  <h2>Teste Claude API — MPPA</h2>
  <p class="sub">Diagnóstico em 3 etapas: Apps Script → Proxy → Claude</p>

  <label>URL do Apps Script</label>
  <textarea id="gs" rows="2" placeholder="https://script.google.com/macros/s/...exec"></textarea>

  <label>Chave Claude (sk-ant-...)</label>
  <input type="text" id="key" placeholder="sk-ant-api03-...">

  <div class="btns">
    <button onclick="testarGS()">1. Testar Apps Script</button>
    <button onclick="testarProxy()">2. Testar Proxy Claude</button>
    <button class="sec" style="grid-column:1/-1" onclick="testarTudo()">▶ Testar tudo (1+2)</button>
  </div>

  <div class="log" id="log"></div>
</div>

<script>
var logEl = document.getElementById('log');

function log(msg, cls) {
  logEl.style.display = 'block';
  var d = document.createElement('div');
  if (cls) d.className = cls;
  d.textContent = msg;
  logEl.appendChild(d);
  logEl.scrollTop = logEl.scrollHeight;
}
function logSep() { log('─────────────────────────────────────'); }

window.onload = function() {
  var gs  = localStorage.getItem('mppa_gs')  || '';
  var key = localStorage.getItem('mppa_ak')  || '';
  if (gs)  document.getElementById('gs').value  = gs;
  if (key) document.getElementById('key').value = key;
};

// ── ETAPA 1: Apps Script responde? ────────────────────────────────
async function testarGS() {
  logEl.innerHTML = '';
  var gs = document.getElementById('gs').value.trim();
  if (!gs) { log('Cole a URL do Apps Script.', 'err'); return; }

  log('ETAPA 1 — Apps Script acessível?', 'info');
  log('URL: ' + gs.substring(0, 65) + '...');

  // Tenta GET simples primeiro
  try {
    var t0 = Date.now();
    var r = await fetch(gs + '?action=ping', { method: 'GET' });
    var ms = Date.now() - t0;
    log('GET respondeu: HTTP ' + r.status + ' (' + ms + 'ms)', r.ok || r.status===200 ? 'ok' : 'warn');
    var txt = await r.text();
    log('Conteúdo: ' + txt.substring(0, 150));
  } catch(e) {
    log('GET falhou: ' + e.message, 'err');
  }

  logSep();

  // Tenta POST simples
  try {
    var t1 = Date.now();
    var r2 = await fetch(gs, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // evita preflight CORS
      body: JSON.stringify({ action: 'ping' })
    });
    var ms2 = Date.now() - t1;
    log('POST respondeu: HTTP ' + r2.status + ' (' + ms2 + 'ms)', r2.ok ? 'ok' : 'warn');
    var txt2 = await r2.text();
    log('Conteúdo: ' + txt2.substring(0, 200));

    if (txt2.includes('"ok"') || txt2.includes('error')) {
      log('');
      log('✓ Apps Script está respondendo.', 'ok');
      localStorage.setItem('mppa_gs', gs);
    }
  } catch(e) {
    log('POST falhou: ' + e.message, 'err');
    log('');
    log('CAUSA: Apps Script bloqueando a origem (CORS) ou URL incorreta.', 'warn');
    log('VERIFICAÇÕES:', 'warn');
    log('  1. A implantação está como "Qualquer pessoa"?', 'warn');
    log('  2. A URL termina em /exec (não /dev)?', 'warn');
    log('  3. Após colar o código novo, clicou em "Nova versão" + Implantar?', 'warn');
  }
}

// ── ETAPA 2: Proxy Claude ─────────────────────────────────────────
async function testarProxy() {
  logEl.innerHTML = '';
  var gs  = document.getElementById('gs').value.trim();
  var key = document.getElementById('key').value.trim();
  if (!gs || !key) { log('Preencha URL e chave.', 'err'); return; }

  log('ETAPA 2 — Proxy Claude via Apps Script', 'info');

  try {
    var t0 = Date.now();
    var r = await fetch(gs, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        action:     'claude',
        apiKey:     key,
        messages:   [{ role: 'user', content: 'Responda apenas: MPPA OK.' }],
        max_tokens: 20
      })
    });
    var ms = Date.now() - t0;
    log('HTTP ' + r.status + ' · ' + ms + 'ms', r.ok ? 'ok' : 'warn');

    var txt = await r.text();
    log('Raw: ' + txt.substring(0, 300));

    var data;
    try { data = JSON.parse(txt); } catch(e) {
      log('Resposta não é JSON. Apps Script provavelmente não tem o código do proxy ainda.', 'err');
      return;
    }

    if (data.ok && data.text) {
      log('');
      log('✓ TUDO FUNCIONANDO!', 'ok');
      log('Resposta Claude: ' + data.text.trim(), 'ok');
      log('Modelo: ' + (data.model || 'claude'), 'ok');
      log('Latência: ' + ms + 'ms', 'ok');
      localStorage.setItem('mppa_ak', key);
      localStorage.setItem('mppa_gs', gs);
      log('');
      log('Chaves salvas. Botões Despacho prontos para usar.', 'ok');
    } else {
      log('');
      log('Erro do proxy: ' + (data.error || JSON.stringify(data)), 'err');
      if (data.detail) log('Detalhe: ' + data.detail, 'warn');
      if (data.error && data.error.includes('401')) {
        log('Chave Claude inválida ou revogada.', 'warn');
      }
      if (data.error && data.error.includes('Chave Claude')) {
        log('Apps Script não recebeu a chave — verifique o código do proxy.', 'warn');
      }
    }
  } catch(e) {
    log('Falhou: ' + e.message, 'err');
  }
}

async function testarTudo() {
  logEl.innerHTML = '';
  log('=== DIAGNÓSTICO COMPLETO ===', 'info');
  log('');
  await testarGS();
  log('');
  logSep();
  log('');
  await testarProxy();
}
</script>
</body>
</html>
